<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游点涩 · 看板娘台词库</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #09090f; color: #ddd; font-size: 14px; line-height: 1.7;
}

/* ── TOP BAR ── */
.topbar {
  position: sticky; top: 0; z-index: 200;
  background: #09090fee; backdrop-filter: blur(12px);
  border-bottom: 1px solid #1c1c2a;
  padding: 0 1.5rem;
  display: flex; align-items: center; gap: 0;
}
.topbar-brand {
  font-size: 14px; font-weight: 700; color: #fff;
  padding: 14px 0; margin-right: 24px; white-space: nowrap;
}
.topbar-brand span { color: #ff66aa; }
.topbar-search {
  flex: 1; max-width: 320px;
  background: #141420; border: 1px solid #2a2a3a;
  border-radius: 8px; padding: 7px 12px;
  color: #ccc; font-size: 13px; outline: none;
  transition: border-color .2s;
}
.topbar-search:focus { border-color: #ff66aa44; }
.topbar-search::placeholder { color: #444; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.topbar-stat { font-size: 11px; color: #444; white-space: nowrap; }

/* ── LAYOUT ── */
.layout { display: flex; height: calc(100vh - 49px); overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: 240px; flex-shrink: 0;
  background: #0c0c18; border-right: 1px solid #1c1c2a;
  overflow-y: auto; padding: 12px 8px;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: #1c1c2a; border-radius: 2px; }

.sidebar-group { margin-bottom: 8px; }
.sidebar-group-title {
  font-size: 9px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: #333;
  padding: 6px 10px 4px;
}
.sidebar-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px;
  cursor: pointer; transition: background .15s;
  border: 1px solid transparent;
}
.sidebar-item:hover { background: #141420; }
.sidebar-item.active {
  background: #1a1428; border-color: #ff66aa33;
}
.si-num {
  font-size: 10px; color: #333; font-weight: 600;
  min-width: 18px;
}
.sidebar-item.active .si-num { color: #ff66aa; }
.si-name { font-size: 12px; color: #888; flex: 1; line-height: 1.3; }
.sidebar-item.active .si-name { color: #fff; }
.si-count {
  font-size: 10px; color: #333; background: #141420;
  padding: 1px 5px; border-radius: 4px; white-space: nowrap;
}
.sidebar-item.active .si-count { color: #ff66aa; background: #2a1428; }

/* badge dot */
.si-type {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.dot-toast  { background: #44cc66; }
.dot-float  { background: #ffaa44; }
.dot-modal  { background: #66aaff; }
.dot-inline { background: #8888cc; }
.dot-page   { background: #aa77ff; }
.dot-push   { background: #88cc44; }
.dot-unlock { background: #ff88aa; }

/* ── MAIN ── */
.main { flex: 1; overflow-y: auto; padding: 24px; }
.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-thumb { background: #1c1c2a; border-radius: 2px; }

/* scene header */
.scene-header { margin-bottom: 20px; }
.sh-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.sh-num {
  font-size: 11px; font-weight: 700; color: #444;
  background: #141420; padding: 3px 8px; border-radius: 6px;
  border: 1px solid #1c1c2a; white-space: nowrap;
}
.sh-title { font-size: 20px; font-weight: 700; color: #fff; flex: 1; }
.sh-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.sh-badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 6px; white-space: nowrap;
}
.badge-toast  { background: #0d2210; color: #44cc66; border: 1px solid #44cc6622; }
.badge-float  { background: #1a1808; color: #ffaa44; border: 1px solid #ffaa4422; }
.badge-modal  { background: #081018; color: #66aaff; border: 1px solid #66aaff22; }
.badge-inline { background: #10101a; color: #8888cc; border: 1px solid #8888cc22; }
.badge-page   { background: #140e20; color: #aa77ff; border: 1px solid #aa77ff22; }
.badge-push   { background: #0e1408; color: #88cc44; border: 1px solid #88cc4422; }
.badge-unlock { background: #200e14; color: #ff88aa; border: 1px solid #ff88aa22; }

.sh-meta { font-size: 12px; color: #444; line-height: 1.6; }
.sh-meta strong { color: #666; }

/* trigger info box */
.trigger-info {
  background: #0e0e1c; border: 1px solid #1c1c2a;
  border-radius: 10px; padding: 14px 16px; margin-bottom: 20px;
}
.ti-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
.ti-item { }
.ti-label { font-size: 10px; color: #333; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 4px; }
.ti-val { font-size: 12px; color: #aaa; line-height: 1.5; }
.ti-val.hi { color: #fff; }

/* dialog section */
.dialog-section { margin-bottom: 20px; }
.ds-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px solid #141420;
}
.ds-char-dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-raina { background: #aa77ff; }
.dot-guji  { background: #44ccaa; }
.ds-char-name { font-size: 11px; font-weight: 700; letter-spacing: .06em; }
.cn-raina { color: #aa77ff; }
.cn-guji  { color: #44ccaa; }
.ds-char-role { font-size: 11px; color: #333; }

/* dialog card */
.dialog-card {
  border-radius: 0 10px 10px 0;
  padding: 12px 16px; margin-bottom: 8px;
  position: relative;
}
.dc-raina { background: #13112a; border-left: 3px solid #7744cc; }
.dc-guji  { background: #0c1c14; border-left: 3px solid #1d9e75; }
.dc-label {
  font-size: 10px; font-weight: 600; letter-spacing: .05em;
  margin-bottom: 5px;
}
.dcl-raina { color: #7744cc; }
.dcl-guji  { color: #1d9e75; }
.dc-sub { font-size: 10px; color: #333; margin-bottom: 5px; font-style: italic; }
.dc-text { font-size: 13px; color: #ccc; line-height: 1.65; }
.dc-id {
  position: absolute; right: 10px; top: 10px;
  font-size: 9px; color: #222; font-family: monospace;
  background: #141420; padding: 1px 5px; border-radius: 4px;
}
.copy-btn {
  position: absolute; right: 10px; bottom: 10px;
  font-size: 10px; color: #333; background: #141420;
  border: 1px solid #1c1c2a; border-radius: 4px;
  padding: 2px 7px; cursor: pointer; transition: all .15s;
  display: none;
}
.dialog-card:hover .copy-btn { display: block; }
.copy-btn:hover { color: #fff; border-color: #444; }
.copy-btn.copied { color: #44cc66; border-color: #44cc6644; }

/* empty state */
.empty {
  text-align: center; padding: 60px 20px; color: #333;
}
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .3; }
.empty-text { font-size: 14px; }

/* search highlight */
mark { background: #ff66aa33; color: #ff88aa; border-radius: 2px; padding: 0 2px; }

/* ── UNLOCK SPECIAL ── */
.unlock-story {
  background: #0e0e1c; border: 1px solid #ff88aa22;
  border-radius: 12px; padding: 16px 18px; margin-bottom: 16px;
}
.unlock-note {
  font-size: 12px; color: #444; font-style: italic;
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid #141420;
}

/* responsive */
@media (max-width: 600px) {
  .sidebar { width: 200px; }
  .main { padding: 16px; }
}
</style>
</head>

<div class="layout">

          { char: "raina", text: "「主人的累计消费已达到里程碑节点。……莱伊娜准备了一份小礼物，请主人查收站内信。」" },
          { char: "guji",  text: "「莱伊娜准备礼物！！莱伊娜准备礼物了喵呐！！主人酱快去看！！」" },
          { char: "raina", text: "「……主人对自己喜欢的东西，从不吝啬。莱伊娜，觉得这没什么不好。」（小声，像是自言自语）" },
        ],
        note: "这句话没有说给任何人听。但咕叽在旁边，听见了。"
      },
    ]
  }
];

const GROUPS = ["登录 / 注册","首页","游戏详情","G点 / 积分","VIP","签到 / 任务","游戏管理","通知","时段","系统状态","隐藏剧情"];
const TYPE_LABEL = { toast:"Toast 提示条", float:"Float 悬浮气泡", modal:"Modal 弹窗", inline:"Inline 页内嵌入", page:"Page 全屏", push:"Push 站内信", unlock:"全屏专页" };

let currentScene = SCENES[0];
let searchQuery = "";

function init() {
  renderSidebar();
  renderMain(SCENES[0]);
}

function renderSidebar(filter = "") {
  const sb = document.getElementById("sidebar");
  let html = "";
  GROUPS.forEach(group => {
    const items = SCENES.filter(s => s.group === group && (!filter || matchScene(s, filter)));
    if (!items.length) return;
    html += `<div class="sidebar-group">
      <div class="sidebar-group-title">${group}</div>`;
    items.forEach(s => {
      const active = s.id === currentScene.id ? " active" : "";
      const count = s.unlocks ? s.unlocks.length : s.dialogs.length;
      html += `<div class="sidebar-item${active}" onclick="selectScene('${s.id}')">
        <div class="si-num">${s.num}</div>
        <div class="si-type dot-${s.type}"></div>
        <div class="si-name">${s.name}</div>
        <div class="si-count">${count}</div>
      </div>`;
    });
    html += `</div>`;
  });
  if (!html) html = `<div style="padding:20px 10px;text-align:center;color:#333;font-size:12px">无匹配结果</div>`;
  sb.innerHTML = html;
}

function renderMain(scene) {
  const main = document.getElementById("main");
  let html = "";

  html += `<div class="scene-header">
    <div class="sh-top">
      <span class="sh-num">场景 ${scene.num}</span>
      <div class="sh-title">${highlight(scene.name)}</div>
      <div class="sh-badges">
        <span class="sh-badge badge-${scene.type}">${TYPE_LABEL[scene.type]}</span>
      </div>
    </div>
  </div>`;

  html += `<div class="trigger-info">
    <div class="ti-grid">
      <div class="ti-item"><div class="ti-label">触发时机</div><div class="ti-val hi">${highlight(scene.trigger)}</div></div>
      <div class="ti-item"><div class="ti-label">展示页面</div><div class="ti-val">${highlight(scene.page)}</div></div>
      <div class="ti-item"><div class="ti-label">触发频率</div><div class="ti-val">${scene.freq}</div></div>
      <div class="ti-item"><div class="ti-label">展示时长 / 交互</div><div class="ti-val">${scene.duration}</div></div>
    </div>
  </div>`;

  if (scene.unlocks) {
    scene.unlocks.forEach(u => {
      html += `<div class="unlock-story">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
          <span style="font-size:10px;color:#333;font-family:monospace;background:#141420;padding:2px 7px;border-radius:4px">${u.id}</span>
          <span style="font-size:15px;font-weight:700;color:#ff88aa">${highlight(u.name)}</span>
          <span style="font-size:11px;color:#444">触发条件：${highlight(u.cond)}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:5px">`;
      u.dialogs.forEach(d => {
        html += `<div class="dialog-card dc-${d.char}" style="position:relative">
          <div class="dc-label dcl-${d.char}">${d.char === "raina" ? "莱伊娜" : "咕叽"}</div>
          <div class="dc-text">${highlight(d.text)}</div>
          <button class="copy-btn" onclick="(function(b){var t=b.previousElementSibling;copyText(b,t?t.innerText||t.textContent:'');})(this)">复制</button>
        </div>`;
      });
      html += `</div><div class="unlock-note">${u.note}</div></div>`;
    });
  } else {
    const rainaDialogs = scene.dialogs.filter(d => d.char === "raina");
    const gujiDialogs  = scene.dialogs.filter(d => d.char === "guji");

    html += `<div class="dialog-section">
      <div class="ds-header">
        <div class="ds-char-dot dot-raina"></div>
        <div class="ds-char-name cn-raina">莱伊娜</div>
        <div class="ds-char-role">— 高冷克制 · 冷静可靠</div>
      </div>`;
    rainaDialogs.forEach(d => {
      html += `<div class="dialog-card dc-raina" style="position:relative">
        <div class="dc-id">${d.id}</div>
        <div class="dc-label dcl-raina">莱伊娜</div>
        <div class="dc-sub">${d.sub}</div>
        <div class="dc-text">${highlight(d.text)}</div>
        <button class="copy-btn" onclick="(function(b){var t=b.previousElementSibling;copyText(b,t?t.innerText||t.textContent:'');})(this)">复制</button>
      </div>`;
    });
    html += `</div>`;

    html += `<div class="dialog-section">
      <div class="ds-header">
        <div class="ds-char-dot dot-guji"></div>
        <div class="ds-char-name cn-guji">咕叽</div>
        <div class="ds-char-role">— 元气活泼 · 情绪价值</div>
      </div>`;
    gujiDialogs.forEach(d => {
      html += `<div class="dialog-card dc-guji" style="position:relative">
        <div class="dc-id">${d.id}</div>
        <div class="dc-label dcl-guji">咕叽</div>
        <div class="dc-sub">${d.sub}</div>
        <div class="dc-text">${highlight(d.text)}</div>
        <button class="copy-btn" onclick="(function(b){var t=b.previousElementSibling;copyText(b,t?t.innerText||t.textContent:'');})(this)">复制</button>
      </div>`;
    });
    html += `</div>`;
  }

  main.innerHTML = html;
  main.scrollTop = 0;
}

function selectScene(id) {
  currentScene = SCENES.find(s => s.id === id);
  renderSidebar(searchQuery);
  renderMain(currentScene);
}

function handleSearch() {
  searchQuery = document.getElementById("searchInput").value.trim().toLowerCase();
  if (!searchQuery) {
    renderSidebar();
    renderMain(currentScene);
    document.getElementById("statText").textContent = "27 场景 · 162 条台词";
    return;
  }
  const matched = SCENES.filter(s => matchScene(s, searchQuery));
  renderSidebar(searchQuery);
  if (matched.length > 0) {
    currentScene = matched[0];
    renderMain(currentScene);
  } else {
    document.getElementById("main").innerHTML = `<div class="empty"><div class="empty-icon">○</div><div class="empty-text">未找到与「${searchQuery}」相关的台词或场景</div></div>`;
  }
  const totalDialogs = matched.reduce((acc, s) => acc + (s.dialogs ? s.dialogs.length : s.unlocks.reduce((a,u) => a+u.dialogs.length, 0)), 0);
  document.getElementById("statText").textContent = `${matched.length} 场景 · ${totalDialogs} 条台词`;
}

function matchScene(s, q) {
  if (!q) return true;
  if (s.name.toLowerCase().includes(q)) return true;
  if (s.trigger.toLowerCase().includes(q)) return true;
  if (s.group.toLowerCase().includes(q)) return true;
  if (s.dialogs) {
    return s.dialogs.some(d => d.text.toLowerCase().includes(q) || d.sub.toLowerCase().includes(q));
  }
  if (s.unlocks) {
    return s.unlocks.some(u => u.name.includes(q) || u.cond.includes(q) || u.dialogs.some(d => d.text.includes(q)));
  }
  return false;
}

function highlight(text) {
  if (!searchQuery) return text;
  const re = new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function copyText(btn, text) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.cssText = "position:fixed;top:-999px;left:-999px;opacity:0";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try {
    document.execCommand("copy");
    btn.textContent = "已复制";
    btn.classList.add("copied");
    setTimeout(function(){ btn.textContent="复制"; btn.classList.remove("copied"); }, 1500);
  } catch(e) {
    btn.textContent = "请手动复制";
    setTimeout(function(){ btn.textContent="复制"; }, 2000);
  }
  document.body.removeChild(ta);
}

var _texts = {};

function registerText(id, text) {
  _texts[id] = text;
  return id;
}

function copyById(btn, id) {
  copyText(btn, _texts[id] || '');
}

init();
</script>
</body>
</html>
